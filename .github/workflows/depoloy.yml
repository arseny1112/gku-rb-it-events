name: Deploy via FTP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Build frontend
        env:
          VITE_VK_CLIENT_ID: ${{ secrets.VITE_VK_CLIENT_ID }}
          VITE_VK_DIALOG_URL: ${{ secrets.VITE_VK_GROUP_ID }}
          VITE_VK_GROUP_ID: ${{ secrets.VITE_VK_GROUP_ID }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare deployment files
        run: |
          mkdir -p deploy/event_organizer/backend
          
          # Копируем фронтенд
          cp -r frontend/dist/* deploy/
          
          # Копируем бэкенд БЕЗ vendor, .env, node_modules
          rsync -av \
            --exclude='vendor/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='.git/' \
            --exclude='*.log' \
            backend/ deploy/event_organizer/backend/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /public_html/
          exclude: |
            **/vendor/**
            **/.env
            **/node_modules/**
            **/.git/**